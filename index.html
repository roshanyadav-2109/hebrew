<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hebrew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.3s ease, color 0.3s ease;
  }
  body.dark { background: #0a0a0a; color: #ffffff; }

  .screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .container {
    width: 100%;
    max-width: 600px;
    text-align: left;
  }

  .headline {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 40px 0;
  }

  .sub-link {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: normal;
    padding: 4px 0;
    color: inherit;
    background: transparent;
    border: 0;
    text-decoration: underline;
    text-underline-offset: 4px;
    cursor: pointer;
    display: inline-block;
  }
  .sub-link:hover { opacity: 0.75; }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 40px 0;
  }

  .next-btn {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 10px 22px;
    background: transparent;
    color: inherit;
    border: 1px solid currentColor;
    border-radius: 0;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .next-btn:hover { background: #0a0a0a; color: #ffffff; }
  body.dark .next-btn:hover { background: #ffffff; color: #0a0a0a; }

  .final {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    text-transform: lowercase;
    margin: 0;
  }

  .hidden { display: none; }

  @media (max-width: 640px) {
    .headline, .body-text, .final { font-size: 40px; }
  }
</style>
</head>
<body>
  <main class="screen">
    <div class="container">
      <section id="view-1">
        <h1 class="headline" lang="he" dir="rtl">עברית whats this?</h1>
        <button class="sub-link" id="findOut">Let's find out.</button>
      </section>

      <section id="view-2" class="hidden">
        <p class="body-text">inter family we need to figure out but yeah we do whatever we promise</p>
        <button class="next-btn" id="nextBtn">Next</button>
      </section>

      <section id="view-3" class="hidden">
        <h1 class="final">hebrew technologies</h1>
      </section>
    </div>
  </main>

<script>
  const v1 = document.getElementById('view-1');
  const v2 = document.getElementById('view-2');
  const v3 = document.getElementById('view-3');
  document.getElementById('findOut').addEventListener('click', function () {
    v1.classList.add('hidden');
    v2.classList.remove('hidden');
  });
  document.getElementById('nextBtn').addEventListener('click', function () {
    v2.classList.add('hidden');
    v3.classList.remove('hidden');
    document.body.classList.add('dark');
  });
</script>
</body>
</html>
