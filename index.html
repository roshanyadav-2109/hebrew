<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hebrew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.3s ease, color 0.3s ease;
  }
  body.dark { background: #0a0a0a; color: #ffffff; }

  .screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .container {
    width: 100%;
    max-width: 600px;
    text-align: left;
  }

  .headline {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    text-transform: lowercase;
    margin: 0 0 40px 0;
  }
  .headline [lang="he"] { text-transform: none; }
  .headline em { font-style: normal; text-transform: uppercase; }

  .sub-link {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: normal;
    padding: 4px 0;
    color: inherit;
    background: transparent;
    border: 0;
    text-decoration: underline;
    text-underline-offset: 4px;
    cursor: pointer;
    display: inline-block;
  }
  .sub-link:hover { opacity: 0.75; }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    text-transform: lowercase;
    margin: 0 0 40px 0;
  }

  .caption {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 0 0 32px 0;
    opacity: 0.7;
  }

  .next-btn {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 10px 22px;
    background: transparent;
    color: inherit;
    border: 1px solid currentColor;
    border-radius: 0;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .next-btn:hover { background: #0a0a0a; color: #ffffff; }
  body.dark .next-btn:hover { background: #ffffff; color: #0a0a0a; }

  .final {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    text-transform: lowercase;
    margin: 0;
  }

  .diagram {
    width: 100%;
    height: auto;
    margin: 0 0 24px 0;
    display: block;
  }
  .diagram text {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    fill: currentColor;
  }
  .diagram .box {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
  }
  .diagram .arrow {
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
  }
  .diagram .arrow-head { fill: currentColor; }

  .hidden { display: none; }

  @media (max-width: 640px) {
    .headline, .body-text, .final { font-size: 40px; }
  }
</style>
</head>
<body>
  <main class="screen">
    <div class="container">
      <section id="view-1">
        <h1 class="headline">hebrew?? wait.. what's <em>THIS</em> now.</h1>
        <button class="sub-link" id="findOut">let's find out, i guess →</button>
      </section>

      <section id="view-2" class="hidden">
        <p class="body-text">tbh idk what's happening here. but we said we'd do it. so. we're doing it.</p>
        <button class="next-btn next-step" data-from="view-2" data-to="view-3">next</button>
      </section>

      <section id="view-3" class="hidden">
        <svg class="diagram" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect class="box" x="10" y="70" width="120" height="60"/>
          <text x="70" y="105" text-anchor="middle" font-size="16">you</text>

          <line class="arrow" x1="135" y1="100" x2="220" y2="100"/>
          <polygon class="arrow-head" points="220,100 212,96 212,104"/>

          <rect class="box" x="225" y="60" width="150" height="80" stroke-dasharray="6 4"/>
          <text x="300" y="95" text-anchor="middle" font-size="16">??? a mystery</text>
          <text x="300" y="118" text-anchor="middle" font-size="13" opacity="0.6">(tbd)</text>

          <line class="arrow" x1="380" y1="100" x2="465" y2="100"/>
          <polygon class="arrow-head" points="465,100 457,96 457,104"/>

          <rect class="box" x="470" y="70" width="120" height="60"/>
          <text x="530" y="105" text-anchor="middle" font-size="16">hebrew?</text>
        </svg>
        <p class="caption">the plan (sort of)</p>
        <button class="next-btn next-step" data-from="view-3" data-to="view-4">next</button>
      </section>

      <section id="view-4" class="hidden">
        <svg class="diagram" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="box" cx="200" cy="110" r="90"/>
          <circle class="box" cx="320" cy="110" r="90"/>
          <text x="155" y="115" text-anchor="middle" font-size="18" font-weight="600">hebrew</text>
          <text x="365" y="115" text-anchor="middle" font-size="18" font-weight="600">tech</text>
          <text x="260" y="115" text-anchor="middle" font-size="14" opacity="0.7">???</text>
          <text x="500" y="60" text-anchor="middle" font-size="13" opacity="0.6">overlap</text>
          <line class="arrow" x1="500" y1="68" x2="285" y2="105"/>
          <polygon class="arrow-head" points="285,105 294,102 290,110"/>
        </svg>
        <p class="caption">the math checks out. probably.</p>
        <button class="next-btn next-step" data-from="view-4" data-to="view-5">next</button>
      </section>

      <section id="view-5" class="hidden">
        <h1 class="final">hebrew technologies</h1>
      </section>
    </div>
  </main>

<script>
  document.getElementById('findOut').addEventListener('click', function () {
    document.getElementById('view-1').classList.add('hidden');
    document.getElementById('view-2').classList.remove('hidden');
  });

  document.querySelectorAll('.next-step').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const from = document.getElementById(btn.dataset.from);
      const to = document.getElementById(btn.dataset.to);
      from.classList.add('hidden');
      to.classList.remove('hidden');
      if (btn.dataset.to === 'view-5') {
        document.body.classList.add('dark');
      }
    });
  });
</script>
</body>
</html>
